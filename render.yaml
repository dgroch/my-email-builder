# Render Blueprint — https://render.com/docs/blueprint-spec
# In Render: New → Blueprint → connect the repo → this file is auto-detected.
services:
  - type: web
    name: my-email-builder
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
      # Saved designs are stored in a Notion database (durable across redeploys),
      # so no persistent disk / paid plan is required. Set these in the Render
      # dashboard (kept out of the blueprint since they're secrets):
      #   NOTION_TOKEN        — internal integration secret (https://www.notion.so/my-integrations)
      #   NOTION_DESIGNS_DB   — the "Email Designs" database id
      # If NOTION_TOKEN is unset, the app falls back to local-disk storage at
      # DATA_DIR (ephemeral unless you add a persistent disk + paid plan).
