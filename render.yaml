# Render Blueprint — https://render.com/docs/blueprint-spec
# In Render: New → Blueprint → connect the repo → this file is auto-detected.
services:
  - type: web
    name: my-email-builder
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: CHROMIUM_PATH
        value: /usr/bin/chromium
      # Saved designs are stored in a Notion database (durable across redeploys),
      # so no persistent disk / paid plan is required. Set these in the Render
      # dashboard (kept out of the blueprint since they're secrets):
      #   NOTION_TOKEN        — internal integration secret (https://www.notion.so/my-integrations)
      #   NOTION_DESIGNS_DB   — the "Email Designs" database id
      # If NOTION_TOKEN is unset, the app falls back to local-disk storage at
      # DATA_DIR (ephemeral unless you add a persistent disk + paid plan).
      #
      # Campaign generator ("Create campaign" button → POST /api/campaigns/generate).
      # The system prompt + user template are bundled under lib/prompts/. The
      # host calls the LLM (default Anthropic Claude Sonnet 4). Set in Render:
      #   ANTHROPIC_API_KEY              — required; or use CAMPAIGN_LLM_API_KEY
      #   CAMPAIGN_LLM_MODEL             — optional, default 'claude-sonnet-4-20250514'
      #   CAMPAIGN_LLM_BASE_URL          — optional, default https://api.anthropic.com
      #   CAMPAIGN_LLM_MAX_TOKENS        — optional, default 4096
      #   CAMPAIGN_LLM_TEMPERATURE       — optional, default 0.7
      #   CAMPAIGN_LLM_PROVIDER          — optional, default 'anthropic'
      #
      # Live context (passed into the LLM call so generated campaigns reference
      # real products / audiences / blog URLs / lifestyle imagery instead of
      # stale snapshots).
      #   SHOPIFY_STORE_DOMAIN           — optional, default 'figandbloom.com.au' (no auth needed for the public feed)
      #   KLAVIYO_API_KEY                — already set above; used for live audiences
      #   NOTION_TOKEN                   — already set above; used for the blog index
      #   NOTION_BLOG_INDEX_PAGE         — page id (with no dashes) that holds the blog index
      #   ASSET_LIBRARY_URL              — optional, default 'https://asset-library-u70t.onrender.com' (semantic image search; no auth, just a Referer header)
      #   ASSET_LIBRARY_REFERER          — optional, default 'https://my-email-builder.onrender.com/' (the Referer header the asset library expects)
      # Live context is cached for 15 minutes. Add ?fresh=1 to /api/live-context to bypass.
